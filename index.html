<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bookmark Manager - LocalStorage</title>
		<link rel="stylesheet" href="css/style.css" />
		<link rel="stylesheet" href="css/theme-style.css" />
	</head>
	<body>
		<header>
			<div class="branding">
				<div class="logo">
					<?xml version="1.0" encoding="UTF-8"?>
					<svg id="bookmark" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 800 800">
						<path id="secondary" class="svg-shade" d="M400,566.7l-233.3,133.3V133.3c0-18.4,14.9-33.3,33.3-33.3h400c18.4,0,33.3,14.9,33.3,33.3v566.7l-233.3-133.3Z" />
						<path id="primary" class="svg-border" d="M400,566.7l-233.3,133.3V133.3c0-18.4,14.9-33.3,33.3-33.3h400c18.4,0,33.3,14.9,33.3,33.3v566.7l-233.3-133.3Z" />
						<path
							id="plus"
							class="svg-plus"
							d="M400,169.1c25.9,0,46.9,19.5,46.9,43.6v43.6h46.9c25.9,0,46.9,19.5,46.9,43.6s-21,43.6-46.9,43.6h-46.9v43.6c0,24.1-21,43.6-46.9,43.6s-46.9-19.5-46.9-43.6v-43.6h-46.9c-25.9,0-46.9-19.5-46.9-43.6s21-43.6,46.9-43.6h46.9v-43.6c0-24.1,21-43.6,46.9-43.6Z"
						/>
					</svg>
					<div class="name">Book<span>mark</span> Manager</div>
				</div>
			</div>
			<div class="theme-switcher">
				<button id="theme-toggle" class="theme-toggle" aria-label="Switch to dark theme">
					<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 180 180">
						<g id="toogle-sun">
							<path
								d="M153.64,116.36l26.36-26.36-26.36-26.36V26.36h-37.28L90,0l-26.36,26.36H26.36v37.28L0,90l26.36,26.36v37.28h37.28l26.36,26.36,26.36-26.36h37.28v-37.28ZM90,140c-27.61,0-50-22.39-50-50s22.39-50,50-50,50,22.39,50,50-22.39,50-50,50Z"
							/>
						</g>
						<g id="toggle-circle"><path d="M127.5,90c0,20.71-16.79,37.5-37.5,37.5s-37.5-16.79-37.5-37.5,16.79-37.5,37.5-37.5,37.5,16.79,37.5,37.5Z" /></g>
					</svg>
				</button>
			</div>
		</header>
		<main>
			<div class="app-container">
				<div class="input-container">
					<div class="bookmark-creation">
						<input type="text" id="bookmark-name" placeholder="Bookmark Name" required />
						<input
							type="url"
							id="bookmark-url"
							placeholder="Bookmark URL"
							pattern="https://.*"
							onfocus="
								if (this.value === '') {
									this.value = 'https://';
									setTimeout(() => this.setSelectionRange(8, 8), 0);
								}
							"
							required
						/>
						<div class="tag-input-wrapper" id="tag-wrapper">
							<input type="text" id="bookmark-tags" placeholder="Tags (e.g. tech, shopping, dev)" list="tags-suggestions" autocomplete="off" />
						</div>
						<datalist id="tags-suggestions"></datalist>
						<button id="add-bookmark" class="btn" data-type="btn-primary" type="submit">Add Bookmark</button>
					</div>
				</div>
				<div class="controls-container">
					<div class="controls">
						<input type="text" id="search-bar" placeholder="Search by name, URL, or tag..." />
						<button id="toggle-sort" class="btn" data-sort="alphabetical">Sort: Alphabetical</button>
					</div>
				</div>

				<div class="bookmarks-container">
					<div class="bookmark-list" id="bookmark-list"></div>
				</div>
			</div>
		</main>
		<footer>
			&copy;
			<script>
				document.write(new Date().getFullYear());
			</script>
			Bookmark Manager - LocalStorage
		</footer>

		<script src="js/script.js"></script>
		<script src="js/theme-toggle.js"></script>
	</body>
</html>
